<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>TaskMaster</h1>
            <button id="theme-toggle">🌙</button>
        </header>

        <form id="task-form">
            <input type="text" id="task-title" placeholder="Feladat címe" required>
            <input type="date" id="task-deadline">
            
            <select id="task-priority">
                <option value="low" selected>Alacsony</option>
                <option value="medium">Közepes</option>
                <option value="high">Magas</option>
            </select>

            <select id="task-category"></select>

            <button type="button" id="add-category-btn">+ Új kategória</button>
            <button type="submit">Hozzáadás</button>
        </form>

        <div class="filters">
            <select id="category-filter">
                <option value="all">Összes kategória</option>
            </select>
        </div>

        <ul id="task-list"></ul>

        <div class="actions">
            <button id="show-stats">📊 Statisztika</button>
            <button id="show-history">📜 Előzmények</button>
            <button id="random-tip">💡 Random tipp</button>
        </div>
    </div>

    <!-- Statisztika modal -->
    <div id="stats-modal" class="modal">
        <div class="modal-content">
            <h2>Statisztika</h2>
            <div id="stats-content"></div>
            <button id="close-stats">Bezárás</button>
        </div>
    </div>

    <!-- Előzmények modal -->
    <div id="history-modal" class="modal">
        <div class="modal-content">
            <h2>Előzmények</h2>
            <div id="history-content"></div>
            <button id="close-history">Bezárás</button>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
