<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>TaskMaster</h1>
            <button id="theme-toggle">Sötét mód</button>
        </header>

        <form id="task-form">
            <input type="text" id="task-title" placeholder="Feladat címe" maxlength="100" required>
            <input type="date" id="task-deadline" max="9999-12-31">
            
            <select id="task-priority">
                <option value="low" selected>Alacsony</option>
                <option value="medium">Közepes</option>
                <option value="high">Magas</option>
            </select>

            <select id="task-category"></select>

            <button type="button" id="add-category-btn">+ Új kategória</button>
            <button type="submit">Hozzáadás</button>
        </form>

        <div class="controls">
            <select id="category-filter">
                <option value="all">Összes kategória</option>
            </select>

            <select id="sort-option">
                <option value="created-desc" selected>Hozzáadás szerint (legújabb felül)</option>
                <option value="deadline-asc">Lejárat szerint (legkorábbi)</option>
                <option value="deadline-desc">Lejárat szerint (legkésőbbi)</option>
                <option value="priority">Prioritás szerint</option>
                <option value="category">Kategória szerint</option>
            </select>
        </div>

        <ul id="task-list"></ul>

        <div class="actions">
            <button id="show-stats">Statisztika</button>
            <button id="show-history">Előzmények</button>
            <button id="random-tip">Random tipp</button>
        </div>
    </div>

    <!-- Új kategória popup -->
    <div id="category-modal" class="modal">
        <div class="modal-content">
            <h2>Új kategória hozzáadása</h2>
            <input type="text" id="new-category-name" placeholder="Kategória neve" maxlength="100">
            <div class="modal-buttons">
                <button id="save-category">Mentés</button>
                <button id="cancel-category">Mégse</button>
            </div>
        </div>
    </div>

    <!-- Szerkesztő popup -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h2>Feladat szerkesztése</h2>
            <input type="text" id="edit-title" placeholder="Feladat címe" maxlength="100">
            <textarea id="edit-note" placeholder="Megjegyzés..." maxlength="300"></textarea>
            <input type="date" id="edit-deadline" max="9999-12-31">
            
            <select id="edit-priority">
                <option value="low">Alacsony</option>
                <option value="medium">Közepes</option>
                <option value="high">Magas</option>
            </select>

            <select id="edit-category"></select>

            <div class="modal-buttons">
                <button id="save-edit">Mentés</button>
                <button id="cancel-edit">Mégse</button>
            </div>
        </div>
    </div>

    <!-- Random tipp popup -->
    <div id="tip-modal" class="modal">
        <div class="modal-content">
            <h2>Random tipp</h2>
            <p id="tip-text"></p>
            <button id="close-tip">Bezárás</button>
        </div>
    </div>

    <!-- Statisztika popup -->
    <div id="stats-modal" class="modal">
        <div class="modal-content">
            <h2>Statisztika</h2>
            <div id="stats-content"></div>
            <button id="close-stats">Bezárás</button>
        </div>
    </div>

    <!-- Előzmények popup -->
    <div id="history-modal" class="modal">
        <div class="modal-content">
            <h2>Előzmények</h2>
            <div id="history-content"></div>
            <button id="close-history">Bezárás</button>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
